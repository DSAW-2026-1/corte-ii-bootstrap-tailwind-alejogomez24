<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insights Card – Bootstrap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend+Deca:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <style>
    :root {
      /* --- colores exactos del style guide --- */
      --bg-page:        hsl(233, 47%, 7%);
      --bg-card:        hsl(244, 38%, 16%);
      --accent:         hsl(277, 64%, 61%);
      --text-heading:   hsl(0, 0%, 100%);
      --text-paragraph: hsla(0, 0%, 100%, 0.75);
      --text-stat:      hsla(0, 0%, 100%, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      background-color: var(--bg-page);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
    }

    /* ---- card container ---- */
    .insight-card {
      background: var(--bg-card);
      border-radius: 12px;
      overflow: hidden;
      width: 100%;
      max-width: 1110px;
    }

    /* ---- text side ---- */
    .card-text {
      padding: 4rem 3rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .card-text h1 {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 2rem;
      color: var(--text-heading);
      line-height: 1.2;
      margin-bottom: 1.5rem;
    }

    /* palabra "insights" en acento violeta */
    .card-text h1 span {
      color: var(--accent);
    }

    .card-text p {
      font-size: 15px;
      color: var(--text-paragraph);
      line-height: 1.7;
      max-width: 350px;
      margin-bottom: 4rem;
    }

    /* ---- stats ---- */
    .stats-row {
      display: flex;
      gap: 2.5rem;
      flex-wrap: wrap;
    }

    .stat-item .number {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--text-heading);
    }

    .stat-item .label {
      font-family: 'Lexend Deca', sans-serif;
      font-weight: 400;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-stat);
      margin-top: 4px;
    }

    /* ---- image side ---- */
    .card-image {
      position: relative;
      min-height: 300px;
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* overlay violeta sobre la imagen */
    .card-image::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      opacity: 0.5;
      mix-blend-mode: multiply;
    }

    /* ---- mobile (< 768px) ---- */
    @media (max-width: 767px) {
      .card-text {
        padding: 2.5rem 2rem;
        text-align: center;
        align-items: center;
      }

      .card-text p {
        max-width: 100%;
        margin-bottom: 2.5rem;
      }

      .stats-row {
        flex-direction: column;
        gap: 1.5rem;
        align-items: center;
      }

      /* en mobile la imagen va ARRIBA */
      .row { flex-direction: column-reverse; }

      .card-image {
        min-height: 240px;
      }

      .card-image img {
        height: 240px;
      }
    }
  </style>
</head>
<body>

  <div class="insight-card">
    <div class="row g-0 h-100">

      <!-- Texto (izquierda en desktop, abajo en mobile) -->
      <div class="col-12 col-md-6 card-text">
        <h1>Get <span>insights</span> that help your business grow.</h1>
        <p>Discover the benefits of data analytics and make better decisions regarding revenue, customer experience, and overall efficiency.</p>
        <div class="stats-row">
          <div class="stat-item">
            <div class="number">10k+</div>
            <div class="label">Companies</div>
          </div>
          <div class="stat-item">
            <div class="number">314</div>
            <div class="label">Templates</div>
          </div>
          <div class="stat-item">
            <div class="number">12M+</div>
            <div class="label">Queries</div>
          </div>
        </div>
      </div>

      <!-- Imagen (derecha en desktop, arriba en mobile) -->
      <div class="col-12 col-md-6 card-image">
        <img
          src="images/image-header-desktop.jpg"
          alt="Team working on data analytics"
        />
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

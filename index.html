<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insights Card – Challenge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Lexend', sans-serif;
      background: #0d0d1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }
    h1 { color: #f1f5f9; font-size: clamp(1.4rem, 4vw, 2rem); text-align: center; }
    h1 span { color: #a855f7; }
    p { color: #94a3b8; font-size: .9rem; text-align: center; max-width: 380px; }
    .cards { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .card-link {
      text-decoration: none;
      background: #161628;
      border: 1px solid #2d2d50;
      border-radius: 14px;
      padding: 2rem 2.5rem;
      display: flex; flex-direction: column; align-items: center; gap: 1rem;
      width: 200px;
      transition: border-color .2s, transform .2s;
    }
    .card-link:hover { border-color: #a855f7; transform: translateY(-4px); }
    .card-link .icon { font-size: 2rem; }
    .card-link .name { color: #f1f5f9; font-weight: 700; font-size: 1rem; }
    .card-link .tag {
      background: #7c3aed22; color: #a855f7;
      font-size: .7rem; padding: .2rem .6rem;
      border-radius: 999px; letter-spacing: .05em;
    }
  </style>
</head>
<body>
  <h1>Get <span>insights</span> that help<br/>your business grow.</h1>
  <p>Frontend challenge — choose a version to preview:</p>
  <div class="cards">
    <a href="bootstrap.html" class="card-link">
      <span class="icon">🅱️</span>
      <span class="name">Bootstrap</span>
      <span class="tag">v5.3</span>
    </a>
    <a href="tailwind.html" class="card-link">
      <span class="icon">🌊</span>
      <span class="name">Tailwind</span>
      <span class="tag">v3</span>
    </a>
  </div>
</body>
</html>
